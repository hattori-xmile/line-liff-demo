<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE連携</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* ステータス別の表示 */
    .status-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }
    .status-loading .status-icon { background: #e8f4fd; }
    .status-success .status-icon { background: #e8f8e8; }
    .status-error .status-icon   { background: #fde8e8; }

    h1 { font-size: 18px; color: #333; margin-bottom: 8px; }
    p  { font-size: 14px; color: #666; line-height: 1.6; }

    .seeker-id {
      background: #f0f0f0;
      border-radius: 8px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 13px;
      color: #333;
      margin: 12px 0;
      word-break: break-all;
    }

    .btn {
      display: inline-block;
      background: #06C755;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 16px;
      text-decoration: none;
    }
    .btn:hover { background: #05b34c; }
    .btn-close { background: #999; }
    .btn-close:hover { background: #777; }

    .hidden { display: none; }

    .debug {
      margin-top: 16px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 11px;
      color: #999;
      text-align: left;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <!-- ① ローディング画面 -->
  <div id="screen-loading" class="container status-loading">
    <div class="status-icon">⏳</div>
    <h1>LINE連携を開始しています...</h1>
    <p>しばらくお待ちください</p>
  </div>

  <!-- ② 成功画面 -->
  <div id="screen-success" class="container status-success hidden">
    <div class="status-icon">✅</div>
    <h1>LINE連携が完了しました</h1>
    <p>今後はLINEで求人のご案内や<br>面談のご連絡をお送りします。</p>
    <button class="btn btn-close" onclick="closeLiff()">閉じる</button>
  </div>

  <!-- ③ エラー画面 -->
  <div id="screen-error" class="container status-error hidden">
    <div class="status-icon">❌</div>
    <h1>連携できませんでした</h1>
    <p id="error-message">エラーが発生しました。</p>
    <button class="btn btn-close" onclick="closeLiff()">閉じる</button>
  </div>

  <!-- ④ 非LINEブラウザで開いた場合 -->
  <div id="screen-not-line" class="container hidden">
    <div class="status-icon" style="background:#fff3e0;">📱</div>
    <h1>LINEアプリで開いてください</h1>
    <p>このリンクはLINEアプリから<br>開く必要があります。</p>
    <p style="margin-top:12px; font-size:12px; color:#999;">
      スマートフォンでLINEアプリがインストールされた状態で、もう一度URLをタップしてください。
    </p>
  </div>

  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.24.0/sdk.js"></script>

  <script>
    // ─── 設定 ──────────────────────────────
    var LIFF_ID = '2005654680-hASVyWme';
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzoy22ofn1pOi8kr5OdChECKuct9pEBWVlYAI4dLr4Ha-VnrJjVZ38eN9OOqTRentYRQw/exec';
    // ──────────────────────────────────────

    // URLパラメータからseekerIDを取得
    // LINEのログインリダイレクト時にパラメータが消えるためsessionStorageに保存
    (function() {
      var params = new URLSearchParams(window.location.search);
      var sid = params.get('sid');
      if (sid) sessionStorage.setItem('seekerId', sid);
    })();

    function getSeekerIdFromUrl() {
      var params = new URLSearchParams(window.location.search);
      // liff.state経由でパラメータが渡される場合の対応
      var liffState = params.get('liff.state');
      if (liffState) {
        try {
          var stateParams = new URLSearchParams(decodeURIComponent(liffState));
          var stateSid = stateParams.get('sid');
          if (stateSid) return stateSid;
        } catch(e) {}
      }
      return params.get('sid') || sessionStorage.getItem('seekerId') || '';
    }

    // 画面切り替え
    function showScreen(id) {
      var screens = ['screen-loading', 'screen-success', 'screen-error', 'screen-not-line'];
      screens.forEach(function(s) {
        document.getElementById(s).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
    }

    // エラー表示
    function showError(message) {
      document.getElementById('error-message').textContent = message;
      showScreen('screen-error');
    }

    // LIFF閉じる
    function closeLiff() {
      if (liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.close();
      }
    }

    // ─── メイン処理 ──────────────────────────
    async function main() {
      var seekerId = getSeekerIdFromUrl();

      // seekerIDがない場合
      if (!seekerId) {
        showError('URLが正しくありません。送られたリンクからもう一度アクセスしてください。');
        return;
      }

      try {
        // LIFF初期化
        await liff.init({ liffId: LIFF_ID });

        // LINEアプリ内でない場合
        if (!liff.isLoggedIn()) {
          if (!liff.isInClient()) {
            // 外部ブラウザで開いた場合 → LINEログインに遷移
            liff.login({ redirectUri: window.location.href });
            return;
          }
        }

        // LINE userIdを取得
        var profile = await liff.getProfile();
        var lineUserId = profile.userId;
        var displayName = profile.displayName;

        console.log('seekerId:', seekerId);
        console.log('lineUserId:', lineUserId);
        console.log('displayName:', displayName);

        // GASに紐付けリクエストを送信
        var linkUrl = GAS_URL + '?action=link&seekerId=' + encodeURIComponent(seekerId) + '&lineUserId=' + encodeURIComponent(lineUserId);

        var response = await fetch(linkUrl);
        var result = await response.json();

        if (result.status === 'ok') {
          showScreen('screen-success');
        } else {
          showError(result.message || '紐付けに失敗しました。');
        }

      } catch (error) {
        console.error('Error:', error);
        showError('エラーが発生しました: ' + error.message);
      }
    }

    // 実行
    main();
  </script>

</body>
</html>
